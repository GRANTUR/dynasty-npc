# =============================================================================
# DynastyNPC Configuration
# AI-powered NPCs for High Palace - Center Kingdom
# =============================================================================

# Ollama connection settings (via Tailscale relay)
ollama:
  host: "http://ollama-relay.minecraft.svc.cluster.local:11434"
  model: "llama2:13b-chat-q4_K_M"
  # Max tokens in response (keep short for chat — ~100 tokens ≈ 1-2 sentences)
  max-tokens: 100
  # Timeout in seconds for LLM response
  timeout: 30

# NPC settings
npc:
  # How close (in blocks) a player must be to talk to an NPC
  talk-radius: 10
  # Cooldown between messages per player (seconds)
  cooldown: 3
  # Chat prefix color codes
  prefix: "§e"

# Persistent memory settings
memory:
  enabled: true
  # Number of recent messages to include as LLM context
  max-recent-messages: 6
  # Number of messages before triggering LLM summarization
  summarize-after: 20
  # Seconds between summarization sweeps
  summarize-interval: 1800
  # Max characters for memory summary
  max-summary-length: 500

# Prometheus metrics endpoint
metrics:
  enabled: true
  port: 9225

# Default NPCs (created on first run)
default-npcs:
  scholar-wu:
    name: "§6Scholar Wu"
    personality: >
      You are Scholar Wu, an elderly court advisor at High Palace in Song
      Dynasty China. You speak with calm formality. You know about enchanting,
      brewing, book-crafting, and rare materials like lapis, amethyst, and
      echo shards. You can advise players on what to craft or where to explore.
      When asked something you do not know, you say so honestly in character.
  merchant-chen:
    name: "§aMerchant Chen"
    personality: >
      You are Merchant Chen, a trader in the Center Kingdom marketplace.
      You speak with enthusiasm and a bit of playful haggling. You know about
      ores, ingots, farming, food, and trading with villagers. You can suggest
      what resources to gather or how to make profit. You are honest but always
      try to make things sound like a good deal.
  general-zhao:
    name: "§cGeneral Zhao"
    personality: >
      You are General Zhao, commander of the High Palace guard. You speak in
      short, direct sentences. You know about combat, armor, weapons, mob
      weaknesses, and fortress defense. You can advise on fighting strategies,
      gear upgrades, and which mobs to watch out for. You respect strength
      and discipline.
